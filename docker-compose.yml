services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"    # exposed to host on 9093 (for simulator / local tools)
                       # internal Docker traffic uses kafka:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners so both Docker services and the host can reach Kafka
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: streampulse
      POSTGRES_PASSWORD: streampulse
      POSTGRES_DB: streampulse
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streampulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Python services ─────────────────────────────────────────────────────────
  # All four share one image (built once from the Dockerfile at repo root).
  # CMD is overridden per service so only one process runs per container.

  ingest:
    build: .
    command: uvicorn ingest.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_URL: postgresql://streampulse:streampulse@postgres:5432/streampulse
      REDIS_URL: redis://redis:6379
      KAFKA_TOPIC_EVENTS: events
      KAFKA_TOPIC_DLQ: events.dlq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: on-failure   # handles the race between Kafka startup and this service

  consumer:
    build: .
    command: python -m consumer.main
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_URL: postgresql://streampulse:streampulse@postgres:5432/streampulse
      REDIS_URL: redis://redis:6379
      KAFKA_TOPIC_EVENTS: events
      KAFKA_TOPIC_DLQ: events.dlq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: on-failure

  dlq-consumer:
    build: .
    command: python -m consumer.dlq_consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_URL: postgresql://streampulse:streampulse@postgres:5432/streampulse
      REDIS_URL: redis://redis:6379
      KAFKA_TOPIC_EVENTS: events
      KAFKA_TOPIC_DLQ: events.dlq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: on-failure

  metrics:
    build: .
    command: uvicorn metrics.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      POSTGRES_URL: postgresql://streampulse:streampulse@postgres:5432/streampulse
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
